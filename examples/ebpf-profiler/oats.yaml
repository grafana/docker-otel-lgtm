oats: 2
name: ebpf profiler starts and attaches to rolldice
fixture:
  type: compose
  template: lgtm
  compose_file: docker-compose.oats.yml
seed:
  type: app
input:
  - path: /rolldice
expected:
  custom-checks:
    - script: |
        set -eu
        curl -fsS "$OATS_APP_URL/rolldice" >/dev/null
        docker compose -f .oats.lgtm.compose.yml -f docker-compose.oats.yml logs --tail 200 otel-ebpf-profiler 2>&1 | grep -q 'eBPF tracer loaded'
        docker compose -f .oats.lgtm.compose.yml -f docker-compose.oats.yml logs --tail 200 otel-ebpf-profiler 2>&1 | grep -q 'Attached tracer program'
