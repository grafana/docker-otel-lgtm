oats: 2
name: nodejs rolldice emits traces and logs
fixture:
  type: compose
  template: lgtm
  compose_file: docker-compose.oats.yml
seed:
  type: app
input:
  - path: /rolldice?rolls=5
expected:
  traces:
    - traceql: '{ span.http.route = "/rolldice" }'
      count: ">= 1"
  logs:
    - logql: '{service_name="dice-server"} |~ `Received request to roll dice`'
      regex:
        - 'Received request to roll dice'
