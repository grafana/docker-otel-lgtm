oats: 2
name: obi sidecar traffic yields traces across services
seed:
  type: app
expected:
  custom-checks:
    - script: |
        set -eu
        logs=$(docker compose -f ../../ci/oats/docker-compose.lgtm.yml -f ./docker-compose.oats.yml logs generate-traffic java go python nodejs dotnet 2>&1)
        printf '%s\n' "$logs" | grep -q 'rolling the dice'
        ! printf '%s\n' "$logs" | grep -q 'error reaching'
