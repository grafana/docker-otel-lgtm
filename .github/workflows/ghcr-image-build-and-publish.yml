---
name: Container Image Build

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # renovate: datasource=github-releases depName=cosign packageName=sigstore/cosign
  COSIGN_VERSION: v3.1.1

jobs:
  build:
    runs-on: ubuntu-24.04

    concurrency:
      group: "${{ github.workflow }}-${{ github.sha }}"
      cancel-in-progress: false

    environment:
      name: release
      deployment: ${{ github.event_name != 'pull_request' }}
      url: ${{ format('{0}/{1}/pkgs/container/{2}', github.server_url, github.repository, 'docker-otel-lgtm') }}

    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Get Git commit timestamp
        id: get-commit-timestamp
        shell: bash
        run: echo "git-commit-epoch=$(git log -1 --pretty=%ct)" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |-
            org.opencontainers.image.ref.name=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            vcs-ref=${{ github.sha }}
            version=${{ github.ref_name }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        env:
          SOURCE_DATE_EPOCH: ${{ steps.get-commit-timestamp.outputs.git-commit-epoch }}
        with:
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            LGTM_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max' || '' }}
          context: docker/
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          push-to-registry: true
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}

      - name: Verify attestations
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          CONTAINER_IMAGE_DIGEST: ${{ format('oci://{0}/{1}@{2}', env.REGISTRY, env.IMAGE_NAME, steps.push.outputs.digest) }}
          CONTAINER_IMAGE_LABEL: ${{ format('oci://{0}/{1}:{2}', env.REGISTRY, env.IMAGE_NAME, github.ref_name == github.event.repository.default_branch && github.event.repository.default_branch || 'latest') }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh attestation verify --repo "${GITHUB_REPOSITORY}" "${CONTAINER_IMAGE_DIGEST}" || exit 1
          gh attestation verify --repo "${GITHUB_REPOSITORY}" "${CONTAINER_IMAGE_LABEL}" || exit 1

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Sign container images
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes "{}@${DIGEST}"

      - name: Verify container image signatures
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          CERTIFICATE_IDENTITY: ${{ format('{0}/{1}', github.server_url, github.workflow_ref) }}
          CERTIFICATE_OIDC_ISSUER: "https://token.actions.githubusercontent.com"
          CONTAINER_IMAGE_DIGEST: ${{ format('{0}/{1}@{2}', env.REGISTRY, env.IMAGE_NAME, steps.push.outputs.digest) }}
          CONTAINER_IMAGE_LABEL: ${{ format('{0}/{1}:{2}', env.REGISTRY, env.IMAGE_NAME, github.ref_name == github.event.repository.default_branch && github.event.repository.default_branch || 'latest') }}
        run: |
          cosign verify "${CONTAINER_IMAGE_DIGEST}" --certificate-identity "${CERTIFICATE_IDENTITY}" --certificate-oidc-issuer "${CERTIFICATE_OIDC_ISSUER}" || exit 1
          cosign verify "${CONTAINER_IMAGE_LABEL}" --certificate-identity "${CERTIFICATE_IDENTITY}" --certificate-oidc-issuer "${CERTIFICATE_OIDC_ISSUER}" || exit 1

  # TODO This is just for testing and is not intended to be merged
  release:
    runs-on: ubuntu-24.04

    concurrency:
      group: ${{ format('{0}-{1}', github.workflow, github.ref) }}
      cancel-in-progress: false

    env:
      # renovate: datasource=github-releases depName=cosign packageName=sigstore/cosign
      COSIGN_VERSION: v3.1.1
      ENVIRONMENT: dev
      IMAGE: otel-lgtm
      IMAGE_NAME: dwyliegrafana/otel-lgtm
      REGISTRY: us-docker.pkg.dev
      REPOSITORY: "dockerhub-${{ github.event.repository.name }}-dev-mirror"

    outputs:
      digest: ${{ steps.publish.outputs.digest }}
      image: ${{ env.IMAGE_NAME }}
      registry: ${{ env.REGISTRY }}
      sign-target: ${{ format('{0}@{1}', steps.publish.outputs.images, steps.publish.outputs.digest) }}
      tags: ${{ steps.publish.outputs.tags }}

    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Get Git commit timestamp
        id: get-commit-timestamp
        shell: bash
        run: echo "git-commit-epoch=$(git log -1 --pretty=%ct)" >> "${GITHUB_OUTPUT}"

      - name: Publish to DockerHub via GAR
        id: publish
        uses: grafana/shared-workflows/actions/docker-build-push-image@c66d74df41cf4ed28a90da1d91c263f9d1609a21 # docker-build-push-image/v0.3.4
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
          SOURCE_DATE_EPOCH: ${{ steps.get-commit-timestamp.outputs.git-commit-epoch }}
        with:
          context: docker
          gar-environment: dev
          gar-image: otel-lgtm
          gar-registry: ${{ env.REGISTRY }}
          gar-repository: ${{ env.REPOSITORY }}
          push: true
          platforms: linux/amd64,linux/arm64
          registries: gar
          build-args: |
            LGTM_VERSION=${{ github.ref_name }}
          tags: |-
            type=match,pattern=v(.*),group=1
            latest
          labels: |-
            org.opencontainers.image.ref.name=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            vcs-ref=${{ github.sha }}
            version=${{ github.ref_name }}

  sign:
    needs: release
    permissions:
      attestations: write
      contents: read
      id-token: write
    uses: grafana/shared-workflows/.github/workflows/sign-and-attest.yml@24c4b83e50e74fce9871480681d123fd3c68f4f4 # TODO Needs to be a tagged version
    with:
      image: ${{ needs.release.outputs.sign-target }}
      registry: ${{ needs.release.outputs.registry }}

  wait-for-mirror:
    needs: release
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    concurrency:
      group: ${{ format('{0}-{1}', github.workflow, needs.release.outputs.digest) }}
      cancel-in-progress: false

    steps:
      - name: Wait for DockerHub mirror
        uses: grafana/shared-workflows/actions/wait-for-docker-publish@cd185787ec303639a71383384e1b0d424b7422fb # wait-for-docker-publish/v0.2.0
        with:
          image: ${{ format('{0}@{1}', needs.release.outputs.image, needs.release.outputs.digest) }}
          timeout: "15m"

  verify:
    needs: [release, sign, wait-for-mirror]
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    concurrency:
      group: ${{ format('{0}-{1}', github.workflow, needs.release.outputs.digest) }}
      cancel-in-progress: false

    env:
      REGISTRY: docker.io

    permissions:
      artifact-metadata: read
      attestations: read
      contents: read

    steps:
      #- name: Verify attestations
      #  env:
      #    CONTAINER_IMAGE_DIGEST: ${{ format('oci://{0}/{1}@{2}', env.REGISTRY, needs.release.outputs.image, needs.release.outputs.digest) }}
      #    CONTAINER_IMAGE_LABEL: ${{ format('oci://{0}/{1}:{2}', env.REGISTRY, needs.release.outputs.image, github.ref_name) }}
      #    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #    SIGNER_WORKFLOW_REF: "grafana/shared-workflows/.github/workflows/sign-and-attest.yml"
      #  run: |
      #    gh attestation verify --repo "${GITHUB_REPOSITORY}" --signer-workflow "${SIGNER_WORKFLOW_REF}" "${CONTAINER_IMAGE_DIGEST}" || exit 1
      #    gh attestation verify --repo "${GITHUB_REPOSITORY}" --signer-workflow "${SIGNER_WORKFLOW_REF}" "${CONTAINER_IMAGE_LABEL}" || exit 1

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Verify container image signatures
        shell: bash
        env:
          CERTIFICATE_IDENTITY: ${{ format('{0}/{1}', github.server_url, github.workflow_ref) }}
          CERTIFICATE_OIDC_ISSUER: "https://token.actions.githubusercontent.com"
          CONTAINER_IMAGE_DIGEST: ${{ format('{0}/{1}@{2}', env.REGISTRY, needs.release.outputs.image, needs.release.outputs.digest) }}
          CONTAINER_IMAGE_LABEL: ${{ format('{0}/{1}:{2}', env.REGISTRY, needs.release.outputs.image, github.ref_name == github.event.repository.default_branch && github.event.repository.default_branch || 'latest') }}
        run: |
          cosign verify "${CONTAINER_IMAGE_DIGEST}" --certificate-identity "${CERTIFICATE_IDENTITY}" --certificate-oidc-issuer "${CERTIFICATE_OIDC_ISSUER}" || exit 1
          cosign verify "${CONTAINER_IMAGE_LABEL}" --certificate-identity "${CERTIFICATE_IDENTITY}" --certificate-oidc-issuer "${CERTIFICATE_OIDC_ISSUER}" || exit 1
