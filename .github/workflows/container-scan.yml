---
name: Container Scan

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions: {}

env:
  FORCE_COLOR: 3
  TERM: xterm
  TRIVY_IMAGE_REF: "grafana/otel-lgtm:latest"
  TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
  TRIVY_SEVERITIES: "CRITICAL,HIGH"

jobs:
  scan-image:
    name: ${{ format('Scan {0} container image', matrix.repository) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: github.event.repository.fork == false

    concurrency:
      group: ${{ format('{0}-{1}', github.workflow, matrix.repository) }}
      cancel-in-progress: false

    permissions:
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image-ref: "grafana/otel-lgtm:latest"
            repository: "DockerHub"
          - image-ref: "ghcr.io/grafana/docker-otel-lgtm:${{ github.event.repository.default_branch }}"
            repository: "GHCR"

    steps:
      - name: Run Trivy (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image-ref }}
          format: "sarif"
          ignore-unfixed: true
          limit-severities-for-sarif: true
          output: "trivy.sarif"
          severity: ${{ env.TRIVY_SEVERITIES }}

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: ${{ !cancelled() }}
        with:
          sarif_file: "trivy.sarif"

      - name: Run Trivy (JSON)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image-ref }}
          format: "json"
          ignore-unfixed: true
          output: "trivy.json"
          severity: ${{ env.TRIVY_SEVERITIES }}

      - name: Check for vulnerabilities
        shell: pwsh
        run: |
          $report = Get-Content ./trivy.json | Out-String | ConvertFrom-Json

          $vulnerabilities = @()

          foreach ($target in $report.Results) {
            foreach ($vulnerability in $target.Vulnerabilities) {
              $vulnerabilities += $vulnerability
            }
          }

          $report = @(
            "# Container Image Vulnerability Report",
            ""
          )

          if ($vulnerabilities.Length -eq 0) {
            $report += ":closed_lock_with_key: No vulnerabilities found."
          } else {
            $report += "| Library | Vulnerability | Severity | Status | Installed Version | Fixed Version | Title |"
            $report += "|:--------|:--------------|:---------|:-------|:------------------|:--------------|:------|"

            foreach ($vulnerability in $vulnerabilities) {
              $title = $vulnerability.Title
              if ([string]::IsNullOrEmpty($title)) {
                $title = $vulnerability.Description
              }

              $fixedVersion = $vulnerability.FixedVersion
              if ([string]::IsNullOrEmpty($fixedVersion)) {
                $fixedVersion = "N/A"
              }

              $report +=
                "| $($vulnerability.PkgName) " +
                "| $($vulnerability.VulnerabilityID) " +
                "| $($vulnerability.Severity) " +
                "| $($vulnerability.Status) " +
                "| $($vulnerability.InstalledVersion) " +
                "| ${fixedVersion} " +
                "| [${title}]($($vulnerability.PrimaryURL)) |"
            }
          }

          $report += ""
          $report += ""

          ($report -Join "`n") >> ${env:GITHUB_STEP_SUMMARY}
