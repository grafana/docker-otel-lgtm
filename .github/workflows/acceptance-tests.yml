---
name: Acceptance Tests

on: [pull_request]

permissions: {}

jobs:
  acceptance-tests:
    permissions: {}
    runs-on: ubuntu-24.04
    steps:
      - name: Check out
        with:
          persist-credentials: false
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          version: v2026.3.9
          sha256: 5302866459744a7bad872d7dccdc5e2cf5d32e80c46f142c805cc21c94dfb6ad

      - name: Run acceptance tests
        run: mise run acceptance-tests ${{ github.event.pull_request.head.sha }}
