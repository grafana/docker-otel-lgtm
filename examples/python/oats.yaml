oats: 2
name: python rolldice emits traces and logs
fixture:
  type: compose
  template: lgtm
  compose_file: docker-compose.oats.yml
seed:
  type: app
input:
  - path: /rolldice
expected:
  custom-checks:
    - script: |
        set -eu
        curl -fsS "$OATS_GRAFANA_URL/api/health" >/dev/null
        curl -fsS "$OATS_APP_URL/rolldice" >/dev/null
  traces:
    - traceql: '{ span.http.route = "/rolldice" }'
      count: ">= 1"
  logs:
    - logql: '{service_name="rolldice"} |~ `Anonymous player is rolling the dice.*`'
      regex:
        - 'Anonymous player is rolling the dice'
