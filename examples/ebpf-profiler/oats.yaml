oats: 2
name: ebpf profiler captures rolldice profiles
seed:
  type: app
input:
  - path: /rolldice
expected:
  custom-checks:
    - script: |
        set -eu
        curl -fsS http://localhost:8080/rolldice >/dev/null
        /usr/bin/curl -fsS -G \
          --data-urlencode 'query=process_cpu:cpu:nanoseconds:cpu:nanoseconds{service_name="unknown_service:rolldice"}' \
          --data-urlencode 'from=now-10m' \
          http://localhost:4040/pyroscope/render | grep -E 'rolldice|main\.rolldice'
