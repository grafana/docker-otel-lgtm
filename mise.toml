# pin all versions to avoid GitHub rate limit
[tools]
dotnet = "10.0.202"
go = "1.26.2"
rust = { version = "1.95.0", components = "clippy,rustfmt" }

# Linters
actionlint = "1.7.12"
bats = "1.13.0"
biome = "2.4.12"
"cargo:xmloxide" = "0.4.1"
"cargo:yaml-lint" = "0.1.0"
editorconfig-checker = "3.6.1"
"github:google/google-java-format" = "1.35.0"
"github:grafana/flint" = "0.20.4"
"go:github.com/grafana/oats" = "0.6.1"
golangci-lint = "2.11.4"
hadolint = "2.14.0"
java = "temurin-25.0.2+10.0.LTS"
lychee = "0.22.0"
node = "24.15.0"
"npm:renovate" = "43.127.0"
"pipx:codespell" = "2.4.2"
"pipx:ruff" = "0.15.11"
rumdl = "0.1.80"
shellcheck = "0.11.0"
shfmt = "3.13.1"

[env]
FLINT_CONFIG_DIR = ".github/config"

[tasks."test:unit"]
description = "Run unit tests"
run = "bats docker/run-otelcol.bats"

[tasks."ci"]
description = "Run all checks (lint + unit tests)"
depends = ["lint", "test:unit"]

[tasks.lint]
description = "Run all lints"
run = "flint run"

[tasks.lgtm]
description = "Run LGTM image"
usage = 'arg "<tag>" default="latest"'
run = './run-lgtm.sh ${usage_tag}'

[tasks.lgtm-obi]
description = "Run LGTM with OBI eBPF auto-instrumentation"
usage = '''
flag "--local" help="Use locally built image"
arg "<tag>" default="latest"
'''
env = { ENABLE_OBI = "true" }
run = 'if [ "$usage_local" = "true" ]; then ./run-lgtm.sh ${usage_tag} true; else ./run-lgtm.sh ${usage_tag}; fi'

[tasks.local-lgtm]
description = "Run locally built LGTM image"
run = './run-lgtm.sh latest true'

[tasks.example]
description = "Run Java example"
alias = "example-java"
run = "./run-example.sh"

[tasks.example-nodejs]
description = "Run Node.js example"
dir = "examples/nodejs"
run = "./run.sh"

[tasks.example-python]
description = "Run Python example"
dir = "examples/python"
run = "./run.sh"

[tasks.example-go]
description = "Run Go example"
dir = "examples/go"
run = "./run.sh"

[tasks.example-dotnet]
description = "Run .NET example"
dir = "examples/dotnet"
run = "./run.sh"

[tasks.generate-traffic]
description = "Generate traffic for the running example"
run = "./generate-traffic.sh"

[tasks.all]
description = "Run LGTM, example, and generate traffic"
depends = ["lgtm", "example", "generate-traffic"]

[tasks.k8s-apply]
description = "Apply LGTM Kubernetes manifest"
run = "kubectl apply -f k8s/lgtm.yaml"

[tasks.k8s-port-forward]
description = "Port-forward LGTM Kubernetes service"
run = "kubectl port-forward service/lgtm 3000:3000 3200:3200 4040:4040 4317:4317 4318:4318 9090:9090"

[tasks.build-lgtm]
description = "Build LGTM image"
usage = 'arg "<tag>" default="latest"'
run = './build-lgtm.sh ${usage_tag}'

[tasks."lint:fix"]
description = "Auto-fix lint issues"
run = "flint run --fix"

[tasks."lint:pre-commit"]
description = "Fast auto-fix lint (skips slow checks) — for pre-commit/pre-push hooks"
run = "flint run --fix --fast-only"

[settings]
# for go backend
experimental = true
