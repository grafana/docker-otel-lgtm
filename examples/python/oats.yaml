oats: 2
name: python rolldice emits traces logs and lgtm readiness
seed:
  type: app
input:
  - path: /rolldice
expected:
  custom-checks:
    - script: ./scripts/check-lgtm-ready.sh
  traces:
    - traceql: '{ span.http.route = "/rolldice" }'
      count: '>= 1'
  logs:
    - logql: '{service_name="rolldice"} |~ `Anonymous player is rolling the dice.*`'
      regex:
        - 'Anonymous player is rolling the dice'
