oats: 2
name: dotnet rolldice emits traces metrics and logs
fixture:
  type: compose
  template: lgtm
  compose_file: docker-compose.oats.yml
seed:
  type: app
input:
  - path: /rolldice
expected:
  traces:
    - traceql: '{ span.http.route = "/rolldice/{player?}" }'
      count: ">= 1"
  metrics:
    - promql: 'http_server_active_requests{http_request_method="GET"}'
      value: '>= 0'
  logs:
    - logql: '{service_name="rolldice"} |~ `Anonymous player is rolling the dice.*`'
      regex:
        - 'Anonymous player is rolling the dice'
