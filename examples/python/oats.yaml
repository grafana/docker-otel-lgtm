oats: 2
name: python rolldice emits traces logs and lgtm readiness
seed:
  type: app
input:
  - path: /rolldice
expected:
  custom-checks:
    - script: ./scripts/check-lgtm-ready.sh
    - |
      set -eu
      curl -fsS http://localhost:8080/rolldice >/dev/null
      docker compose -f ../../ci/oats/docker-compose.lgtm.yml -f ./docker-compose.oats.yml logs python 2>&1         | grep -q 'Anonymous player is rolling the dice'
