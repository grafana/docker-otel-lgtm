---
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    concurrency:
      group: "${{ github.workflow }}-${{ github.ref }}"
      cancel-in-progress: false

    environment:
      name: release
      url: "https://hub.docker.com/r/grafana/otel-lgtm"

    env:
      # renovate: datasource=github-releases depName=cosign packageName=sigstore/cosign
      COSIGN_VERSION: v3.1.1
      IMAGE_OWNER: grafana
      IMAGE_NAME: otel-lgtm

    outputs:
      digest: ${{ steps.publish.outputs.digest }}
      image: ${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}

    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Get Git commit timestamp
        id: get-commit-timestamp
        shell: bash
        run: echo "git-commit-epoch=$(git log -1 --pretty=%ct)" >> "${GITHUB_OUTPUT}"

      - name: Publish to DockerHub via GAR
        id: publish
        uses: grafana/shared-workflows/actions/docker-build-push-image@c66d74df41cf4ed28a90da1d91c263f9d1609a21 # docker-build-push-image/v0.3.4
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
          SOURCE_DATE_EPOCH: ${{ steps.get-commit-timestamp.outputs.git-commit-epoch }}
        with:
          context: docker
          gar-environment: prod
          gar-repository: "dockerhub-docker-${{ env.IMAGE_NAME }}-prod-mirror/${{ env.IMAGE_NAME }}"
          push: true
          platforms: linux/amd64,linux/arm64
          registries: "gar"
          build-args: |
            LGTM_VERSION=${{ github.ref_name }}
          tags: |-
            type=match,pattern=v(.*),group=1
            latest
          labels: |-
            org.opencontainers.image.ref.name=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            vcs-ref=${{ github.sha }}
            version=${{ github.ref_name }}

      # TODO Unresolved question - when do we attest and sign?
      # https://github.com/grafana/docker-otel-lgtm/pull/1467 attempts to answer.

      - name: Generate artifact attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          push-to-registry: true
          subject-name: docker.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.publish.outputs.digest }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Sign container images
        env:
          DIGEST: ${{ steps.publish.outputs.digest }}
          TAGS: ${{ steps.publish.outputs.tags }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes "{}@${DIGEST}"

  wait-for-mirror:
    needs: release
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    concurrency:
      group: "${{ github.workflow }}-${{ needs.release.outputs.digest }}"
      cancel-in-progress: false

    steps:
      - name: Wait for DockerHub mirror
        uses: grafana/shared-workflows/actions/wait-for-docker-publish@cd185787ec303639a71383384e1b0d424b7422fb # wait-for-docker-publish/v0.2.0
        with:
          image: ${{ needs.release.outputs.image }}@${{ needs.release.outputs.digest }}
          timeout: "15m"
