server:
  grpc_listen_port: 9097 # to avoid conflict with tempo

metastore:
  address: 127.0.0.1:9097
  min_ready_duration: 1s
  data_dir: /data/pyroscope/metastore/data
  raft:
    dir: /data/pyroscope/metastore/raft
    snapshots_dir: /data/pyroscope/metastore/raft

architecture_storage: v2

limits:
  write_path: segment-writer

storage:
  backend: filesystem
  filesystem:
    dir: /data/pyroscope/shared

distributor:
  ring:
    kvstore:
      store: inmemory

segment_writer:
  lifecycler:
    min_ready_duration: 1s

query_backend:
  address: 127.0.0.1:9097
