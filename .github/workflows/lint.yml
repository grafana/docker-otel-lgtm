---
name: Lint

on:
  pull_request:

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0 # needed for merge-base used in lint:links-in-modified-files

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: v2026.3.16
          sha256: 1aadc8f126b0fc588b70ad2296cf7a963ba014ef2fd017a6087329ec6160063e

      - name: Lint
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: mise run lint

      - name: Reproduce Renovate log on failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RENOVATE_CONFIG_FILE: .github/renovate.json5
        run: |
          LOG_LEVEL=debug LOG_FORMAT=json \
            renovate --platform=local --require-config=ignored \
            > /tmp/renovate-debug.log 2>&1 || true

      - name: Upload Renovate log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: renovate-debug-log
          path: /tmp/renovate-debug.log
